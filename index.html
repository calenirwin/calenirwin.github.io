<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calen Irwin</title>
    <style>
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: #f7f5f0;
            color: #333;
            text-align: center;
            line-height: 1.6;
            padding: 1rem;
        }

        nav {
            background-color: #e6e3df;
            padding: 1rem 0;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        nav ul li a {
            text-decoration: none;
            color: #333;
            font-size: 1.2rem;
            font-weight: bold;
        }

        section {
            max-width: 800px;
            margin: 3rem auto;
            padding: 2rem;
        }

        section h2 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            color: #5a514b;
        }

        #home {
            margin-top: 4rem;
        }

        #home img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 5px solid #e6e3df;
            margin-bottom: 1.5rem;
        }

        #home h1 {
            font-size: 2.8rem;
            color: #5a514b;
        }

        #home p {
            font-size: 1.2rem;
            color: #7a726d;
        }

        ul {
            list-style: none;
            text-align: left;
            margin-top: 1rem;
            padding-left: 1.5rem;
        }

        ul li::before {
            content: "\2022"; /* Bullet point */
            color: #5a514b;
            font-weight: bold;
            display: inline-block; 
            width: 1rem;
        }

        .project-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .project-card {
            background-color: #ffffff;
            padding: 1.5rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .project-card h3 {
            font-size: 1.5rem;
            color: #5a514b;
        }

        .project-card p {
            color: #7a726d;
            margin: 1rem 0;
        }

        .project-card a {
            text-decoration: none;
            color: #5a514b;
            font-weight: bold;
        }

        #contact .social-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 2rem;
        }

        .social-links a {
            color: #5a514b;
            font-size: 1.2rem;
            text-decoration: none;
        }

        @media (min-width: 768px) {
            .project-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .project-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .social-icons a {
            color: #333;
            font-size: 1.5rem;
            margin: 0 0.5rem;
            text-decoration: none;
        }

        .social-icons a:hover {
            color: #5a514b;
        }

    </style>
</head>
<body>
    <section id="home">
        <img src="assets/profile.jpeg" alt="Profile Picture">
        <h1>Calen Irwin</h1>
        <div class="social-icons">
            <a href="https://github.com/calenirwin" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://linkedin.com/in/calen-b-irwin" target="_blank"><i class="fab fa-linkedin"></i></a>
            <a href="mailto:calen.irwin@gmail.com" target="_blank"><i class="fas fa-envelope"></i></a>
        </div>
        <p>Data Scientist | AI Engineer | Autonomy Research</p>
        <br>
        <p>Building technology for the future of autonomous train operation with AI and intelligent data analytics @ Hitachi Rail</p>
    </section>

    <section id="projects">
        <h2>My Work</h2>
        <div class="project-grid">
            <div class="project-card">
                <h3>Project 1</h3>
                <p>Place holder</p>
                <a href="#">Source</a>
            </div>
            <div class="project-card">
                <h3>Project 2</h3>
                <p>...</p>
                <a href="#">Source</a>
            </div>
            <div class="project-card">
                <h3>Project 3</h3>
                <p>...</p>
                <a href="#">Source</a>
            </div>
        </div>
    </section>
</body>
</html>
